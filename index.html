<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="coin">
      <h3 id="coins">Coins:</h3>
    </div>
    <div class="roll">
      <h3 id="rolls">Rolls:</h3>
    </div>
    <div class="header-container">
      <h2 id="title">Lotto machine</h2>
    </div>
    <h1 id="display">Press Space to roll!</h1>
    <script>
      function sound(src) {
        this.sound = document.createElement("audio");
        this.sound.src = src;
        this.sound.setAttribute("preload", "auto");
        this.sound.setAttribute("controls", "none");
        this.sound.style.display = "none";
        document.body.appendChild(this.sound);
        this.play = function () {
          this.sound.play();
        };
        this.stop = function () {
          this.sound.pause();
        };
      }
      const display = document.getElementById("display");
      let random_number = 0;
      let coins = 0;
      let bronzeUnlocked = false;
      let silverUnlocked = false;
      let goldUnlocked = false;
      let rolls = 0;
      var pullLeverSound;
      pullLeverSound = new sound("pull_lever.mp3");
      document.addEventListener("keydown", (event) => {
        if (event.key == " ") {
          pullLeverSound.play();
          setTimeout(pullLever, 3800);
          function pullLever() {
            random_number = Math.floor(Math.random() * 10) + 1;
            if (random_number == 3) {
              coins += random_number * 2;
              rolls += 1;
              document.body.style.backgroundColor = "skyblue";
              if (rolls == 1) {
                display.innerHTML = "Lucky 3!<br>You have rolled 1 time.";
              } else if (random_number == 3);
              {
                display.innerHTML =
                  "Lucky 3!<br>You have rolled " + rolls + " times.";
              }
            } else {
              coins += random_number;
              rolls += 1;
              if (rolls == 1) {
                display.innerHTML =
                  "You rolled a " +
                  random_number +
                  "!<br> You have rolled 1 time.";
              } else if (rolls != 1) {
                display.innerHTML =
                  "You rolled a " +
                  random_number +
                  "!<br> You have rolled " +
                  rolls +
                  " times.";
              }
              coins.innerHTML = "Coins: " + coins;
              rolls.innerHTML = "Rolls: " + rolls;
              if (coins < 20) {
                document.body.style.backgroundColor = "lightgreen";
              } else if (50 > coins && coins >= 20) {
                document.body.style.backgroundColor = "bronze";
              } else if (100 > coins && coins >= 50) {
                document.body.style.backgroundColor = "silver";
              } else if (coins >= 100) {
                document.body.style.backgroundColor = "gold";
              }
            }
            if (coins >= 100) {
              if (random_number != 3) {
                document.body.style.backgroundColor = "gold";
                if (!goldUnlocked) {
                  if ((rolls = 1)) {
                    display.innerHTML =
                      "You rolled a " +
                      random_number +
                      "!<br>You have rolled 1 time.<br>You have unlocked Gold!";
                  }
                } else {
                  display.innerHTML =
                    "You rolled a " +
                    random_number +
                    "!<br>You have rolled " +
                    rolls +
                    "times.<br>You have unlocked Gold!";
                }
                goldUnlocked = true;
              }
            } else if (coins >= 50) {
              if (random_number != 3) {
                document.body.style.backgroundColor = "silver";
                if (!silverUnlocked) {
                  if (rolls == 1) {
                    display.innerHTML =
                      "You rolled a " +
                      random_number +
                      "!<br>You have rolled 1 time.<br>You have unlocked Silver!";
                  } else {
                    display.innerHTML =
                      "You rolled a " +
                      random_number +
                      "!<br>You have rolled " +
                      rolls +
                      " times.<br>You have unlocked Silver!";
                  }
                  silverUnlocked = true;
                }
              }
            } else if (coins >= 20) {
              if (random_number != 3) {
                document.body.style.backgroundColor = "#CD7F32";
                if (!bronzeUnlocked) {
                  if (rolls == 1) {
                    "You rolled a " +
                      random_number +
                      "!<br>You have unlocked Bronze!";
                  } else {
                    display.innerHTML =
                      "You rolled a " +
                      random_number +
                      "!<br>You have unlocked Bronze!";
                  }
                  bronzeUnlocked = true;
                }
              }
            }
          }
        }
      });
    </script>
  </body>
</html>

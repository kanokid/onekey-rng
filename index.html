<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="coin">
      <h3 id="coins">Coins:</h3>
      <h3 id="rolls">Rolls:</h3>
    </div>
    <div class="header-container">
      <h2 id="title">Lotto machine</h2>
      <h3 id="reset">Press R to reset the game!</h3>
    </div>
    <h1 id="display">Press Space to roll!</h1>
    <script>
      function sound(src) {
        this.sound = document.createElement("audio");
        this.sound.src = src;
        this.sound.setAttribute("preload", "auto");
        this.sound.setAttribute("controls", "none");
        this.sound.style.display = "none";
        document.body.appendChild(this.sound);
        this.play = function () {
          this.sound.play();
        };
        this.stop = function () {
          this.sound.pause();
        };
      }
      const display = document.getElementById("display");
      let random_number = 0;
      let coinCount = 0;
      let bronzeUnlocked = false;
      let silverUnlocked = false;
      let goldUnlocked = false;
      let rollCount = 0;
      var pullLeverSound;
      pullLeverSound = new sound("pull_lever.mp3");
      document.addEventListener("keydown", (event) => {
        if (event.key == " ") {
          pullLeverSound.play();
          setTimeout(pullLever, 3800);
          function pullLever() {
            random_number = Math.floor(Math.random() * 10) + 1;
            if (random_number == 3) {
              coinCount += random_number * 2;
              rollCount += 1;
              document.body.style.backgroundColor = "skyblue";
              if (rollCount == 1) {
                display.innerHTML = "Lucky 3!";
              } else if (random_number == 3);
              {
                display.innerHTML = "Lucky 3!";
              }
            } else {
              coinCount += random_number;
              rollCount += 1;
              if (rollCount == 1) {
                display.innerHTML = "You rolled a " + random_number + "!";
              } else if (rollCount != 1) {
                display.innerHTML = "You rolled a " + random_number + "!";
              }
              coins.innerHTML = "Coins: " + coinCount;
              rolls.innerHTML = "Rolls: " + rollCount;
              if (coinCount < 20) {
                document.body.style.backgroundColor = "lightgreen";
              } else if (50 > coinCount && coinCount >= 20) {
                document.body.style.backgroundColor = "bronze";
              } else if (100 > coinCount && coinCount >= 50) {
                document.body.style.backgroundColor = "silver";
              } else if (coinCount >= 100) {
                document.body.style.backgroundColor = "gold";
              }
            }
            if (coinCount >= 100) {
              if (random_number != 3) {
                document.body.style.backgroundColor = "gold";
                if (!goldUnlocked) {
                  if ((rollCount = 1)) {
                    display.innerHTML =
                      "You rolled a " +
                      random_number +
                      "!<br>You have unlocked Gold!";
                  }
                } else {
                  display.innerHTML =
                    "You rolled a " +
                    random_number +
                    "!<br>You have unlocked Gold!";
                }
                goldUnlocked = true;
              }
            } else if (coinCount >= 50) {
              if (random_number != 3) {
                document.body.style.backgroundColor = "silver";
                if (!silverUnlocked) {
                  if (rollCount == 1) {
                    display.innerHTML =
                      "You rolled a " +
                      random_number +
                      "!<br>You have unlocked Silver!";
                  } else {
                    display.innerHTML =
                      "You rolled a " +
                      random_number +
                      "!<br>You have unlocked Silver!";
                  }
                  silverUnlocked = true;
                }
              }
            } else if (coinCount >= 20) {
              if (random_number != 3) {
                document.body.style.backgroundColor = "#CD7F32";
                if (!bronzeUnlocked) {
                  if (rollCount == 1) {
                    display.innerHTML =
                      "You rolled a " +
                      random_number +
                      "!<br>You have unlocked Bronze!";
                  } else {
                    display.innerHTML =
                      "You rolled a " +
                      random_number +
                      "!<br>You have unlocked Bronze!";
                  }
                  bronzeUnlocked = true;
                }
              }
            }
          }
        } else if (event.key == "r") {
          display.innerHTML = "Press Space to roll";
          coinCount.innerHTML = "coinCount:";
          rollCount.innerHTML = "Rolls:";
          coinCount = 0;
          rollCount = 0;
          random_number = 0;
        }
      });
    </script>
  </body>
</html>

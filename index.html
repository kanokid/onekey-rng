<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="header-container">
      <h2 id="title">Lotto machine</h2>
    </div>
    <h1 id="display">Press Space to roll!</h1>
    <script>
      function sound(src) {
        this.sound = document.createElement("audio");
        this.sound.src = src;
        this.sound.setAttribute("preload", "auto");
        this.sound.setAttribute("controls", "none");
        this.sound.style.display = "none";
        document.body.appendChild(this.sound);
        this.play = function () {
          this.sound.play();
        };
        this.stop = function () {
          this.sound.pause();
        };
      }
      const display = document.getElementById("display");
      let random_number = 0;
      let coins = 0;
      let bronzeHit = false;
      let silverHit = false;
      let goldHit = false;
      let rolls = 0;
      var pullLeverSound;
      pullLeverSound = new sound("pull_lever.mp3");
      document.addEventListener("keydown", (event) => {
        if (event.key == " ") {
          pullLeverSound.play();
          setTimeout(pullLever, 3800);
          function pullLever() {
            random_number = Math.floor(Math.random() * 10) + 1;
            if (random_number == 3) {
              coins += random_number * 2;
              rolls += 1;
              document.body.style.backgroundColor = "skyblue";
              if (rolls == 1) {
                display.innerHTML =
                  "Lucky 3!<br>You now have " +
                  coins +
                  " coins and you have rolled 1 time.";
              }
              display.innerHTML =
                "Lucky 3! <br> You now have " +
                coins +
                " coins and you have rolled " +
                rolls +
                " times.";
            } else {
              coins += random_number;
              rolls += 1;
              if (rolls == 1) {
                display.innerHTML =
                  "You rolled a " +
                  random_number +
                  "!<br> You now have " +
                  coins +
                  " coins and you have rolled 1 time.";
              } else {
                display.innerHTML =
                  "You rolled a " +
                  random_number +
                  "!<br> You now have " +
                  coins +
                  " coins and you have rolled " +
                  rolls +
                  " times.";
              }
            }
            if (coins >= 100) {
              if (random_number != 3) {
                document.body.style.backgroundColor = "gold";
                if (!goldHit) {
                  if ((rolls = 1)) {
                    display.innerHTML =
                      "You rolled a " +
                      random_number +
                      "!<br>You now have " +
                      coins +
                      " coins and you have rolled 1 time.<br>You have unlocked Gold!";
                  }
                } else {
                  display.innerHTML =
                    "You rolled a " +
                    random_number +
                    "!<br>You now have " +
                    coins +
                    " coins and you have rolled " +
                    rolls +
                    "times.<br>You have unlocked Gold!";
                }
                goldHit = true;
              }
            } else if (coins >= 50) {
              if (random_number != 3) {
                document.body.style.backgroundColor = "silver";
                if (!silverHit) {
                  if (rolls == 1) {
                    display.innerHTML =
                      "You rolled a " +
                      random_number +
                      "!<br>You now have " +
                      coins +
                      " coins. and you have rolled 1 time.<br>You have unlocked Silver!";
                    silverHit = true;
                  } else {
                    display.innerHTML =
                      "You rolled a " +
                      random_number +
                      "!<br>You now have " +
                      coins +
                      " coins and you have rolled " +
                      rolls +
                      " times.<br>You have unlocked Silver!";
                  }
                }
              }
            } else if (coins >= 20) {
              if (random_number != 3) {
                document.body.style.backgroundColor = "#CD7F32";
                if (!bronzeHit) {
                  if (rolls == 1) {
                    "You rolled a " +
                      random_number +
                      "!<br>You now have 1 coin.<br>You have unlocked Bronze!";
                  } else {
                    display.innerHTML =
                      "You rolled a " +
                      random_number +
                      "!<br>You now have " +
                      coins +
                      " coins. <br>You have unlocked Bronze!";
                  }
                  bronzeHit = true;
                }
              }
            }
          }
        }
      });
    </script>
  </body>
</html>
